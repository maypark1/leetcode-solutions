name: Sync to Notion

on:
  push:
    branches: [main]
    paths:
      - 'solutions/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Get changed files
        run: |
          git diff --name-only HEAD~1 HEAD -- 'solutions/' > changed_files.txt
          cat changed_files.txt

      - name: Sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PROBLEMS_DB: ${{ secrets.NOTION_PROBLEMS_DB }}
          NOTION_LISTS_DB: ${{ secrets.NOTION_LISTS_DB }}
          NOTION_CHALLENGES_DB: ${{ secrets.NOTION_CHALLENGES_DB }}
        run: python .github/scripts/sync_notion.py